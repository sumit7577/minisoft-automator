<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f1117;
    color: #e6e6e6;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }
  .card {
    background: #161923;
    border: 1px solid #262b3a;
    border-radius: 10px;
    padding: 32px;
    width: 340px;
  }
  h1 { font-size: 18px; margin: 0 0 20px; color: #fff; }
  label { display: block; font-size: 13px; color: #9aa1b2; margin-bottom: 6px; }
  input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid #2c3346;
    background: #0f1117;
    color: #fff;
    font-size: 14px;
    margin-bottom: 16px;
  }
  input:focus { outline: none; border-color: #5b7cfa; }
  button {
    width: 100%;
    padding: 11px;
    border: none;
    border-radius: 6px;
    background: #5b7cfa;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { background: #2c3346; cursor: not-allowed; }
  button:hover:not(:disabled) { background: #4a68e0; }
  #status { margin-top: 16px; font-size: 13px; }
  .status-error { color: #f87171; }
</style>
</head>
<body>

<div class="card">
  <h1>Admin Login</h1>
  <form id="loginForm">
    <label for="username">Username</label>
    <input type="text" id="username" autocomplete="username" required>
    <label for="password">Password</label>
    <input type="password" id="password" autocomplete="current-password" required>
    <button type="submit" id="loginBtn">Sign in</button>
  </form>
  <div id="status"></div>
</div>

<script>
const form = document.getElementById("loginForm");
const btn = document.getElementById("loginBtn");
const status = document.getElementById("status");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  btn.disabled = true;
  btn.textContent = "Signing in...";
  status.textContent = "";

  try {
    const res = await fetch("/admin/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username: document.getElementById("username").value.trim(),
        password: document.getElementById("password").value,
      }),
    });
    const data = await res.json();
    if (!res.ok || data.ok === false) {
      throw new Error(data.output || "Login failed.");
    }
    window.location.href = "/";
  } catch (err) {
    status.textContent = err.message;
    status.className = "status-error";
  } finally {
    btn.disabled = false;
    btn.textContent = "Sign in";
  }
});
</script>

</body>
</html>
